<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement en ligne</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:50px;
  background:#f5f5f5;
}

.box{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}

button{
  background:#ff6600;
  color:white;
  border:none;
  padding:12px;
  margin:10px;
  width:100%;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#e65c00;
}

.paiement{
  margin-top:20px;
  padding:15px;
  background:#f0f0f0;
  border-radius:10px;
}

.paiement img{
  background:white;
  padding:5px;
  border-radius:8px;
  box-shadow:0 0 5px #ccc;
}
</style>

</head>
<body>

<div class="box">

<h2>💳 Acheter un produit</h2>

<button onclick="payer(500, 'Video 1')">
Acheter Vidéo 1 - 500 FCFA
</button>

<button onclick="payer(1000, 'Ebook')">
Acheter Ebook - 1000 FCFA
</button>

<button onclick="payer(2000, 'Formation')">
Acheter Formation - 2000 FCFA
</button>

<!-- Moyens de paiement -->
<div class="paiement">
  <p>✅ Paiement sécurisé</p>

  <div style="display:flex;justify-content:center;gap:20px;margin-top:10px;align-items:center;">

    <div>
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/MTN_Logo.svg" width="60">
      <p style="font-size:12px;">MTN MoMo</p>
    </div>

    <div>
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg" width="60">
      <p style="font-size:12px;">Orange Money</p>
    </div>

  </div>
</div>

</div>

<script>
function payer(prix, produit){

let url = "https://my-coolpay.com/pay?"
+ "amount=" + prix
+ "&reason=" + produit
+ "&return_url=https://paiement-en-ligne.vercel.app/success.html"
+ "&cancel_url=https://paiement-en-ligne.vercel.app/cancel.html"
+ "&error_url=https://paiement-en-ligne.vercel.app/error.html";

window.location.href = url;

}
</script>

</body>
</html>

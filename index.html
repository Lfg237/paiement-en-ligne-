<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boutique</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:40px;
  text-align:center;
}

.box{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}

.produit{
  margin-bottom:30px;
}

button{
  background:#ff6600;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#e65c00;
}

.paiement{
  margin-top:20px;
  padding:15px;
  background:#f0f0f0;
  border-radius:10px;
}

.paiement img{
  width:50px;
  margin:5px;
}
</style>

</head>
<body>

<div class="box">

<h2>🛒 Mes Produits</h2>

<!-- PRODUIT 1 -->
<div class="produit">
  <h3>🎬 Vidéo Premium</h3>
  <p><strong>Prix : 1000 FCFA</strong></p>
  <button onclick="payer(1000, 'Video Premium')">
    Acheter maintenant
  </button>
</div>

<!-- PRODUIT 2 -->
<div class="produit">
  <h3>📘 Ebook</h3>
  <p><strong>Prix : 1500 FCFA</strong></p>
  <button onclick="payer(1500, 'Ebook')">
    Acheter maintenant
  </button>
</div>

<!-- PRODUIT 3 -->
<div class="produit">
  <h3>🎓 Formation</h3>
  <p><strong>Prix : 3000 FCFA</strong></p>
  <button onclick="payer(3000, 'Formation')">
    Acheter maintenant
  </button>
</div>

<!-- Moyens de paiement -->
<div class="paiement">
  <p>✅ Paiement sécurisé</p>
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/MTN_Logo.svg">
  <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg">
  <p>MTN MoMo & Orange Money acceptés</p>
</div>

</div>

<script>
function payer(prix, produit){

  fetch("https://my-coolpay.com/api/TON_PUBLIC_KEY/paylink", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({
      transaction_amount: prix,
      transaction_currency: "XAF",
      transaction_reason: produit,
      app_transaction_ref: "ref_" + Date.now(),
      customer_name: "Client",
      customer_email: "client@email.com",
      customer_lang: "fr"
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.payment_url){
      window.location.href = data.payment_url;
    } else {
      alert("Erreur paiement");
    }
  });

}
</script>

</body>
</html>

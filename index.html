<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement en ligne</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
  padding:50px;
}

.box{
  max-width:350px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #ccc;
}

.logo{
  width:80px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#ff6600;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="box">

<!-- LOGO -->
<img class="logo" src="https://raw.githubusercontent.com/Lfg237/m-dias/main/received_1672125010898590.jpeg">

<h3>🎬 Cours éducatif</h3>
<p><strong>Prix : 1000 FCFA</strong></p>

<!-- INPUT TELEPHONE -->
<input type="tel" id="phone" placeholder="Entrer votre numéro (ex: 699000000)">

<!-- BOUTON -->
<button onclick="payer()">Payer maintenant</button>

</div>

<script>
function payer(){

  let phone = document.getElementById("phone").value;

  if(phone === ""){
    alert("Veuillez entrer votre numéro");
    return;
  }

  fetch("https://my-coolpay.com/api/a471832d-a539-437f-bcba-247f3e9e607c/paylink", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({
      transaction_amount: 1000,
      transaction_currency: "XAF",
      transaction_reason: "Cours éducatif",
      app_transaction_ref: "ref_" + Date.now(),
      customer_phone_number: phone,
      customer_name: "Client",
      customer_email: "client@email.com",
      customer_lang: "fr"
    })
  })
  .then(res => res.json())
 .then(res => res.json())
.then(data => {
  console.log(data); // 👈 IMPORTANT

  if(data.payment_url){
    window.location.href = data.payment_url;
  } else {
    alert("Erreur paiement: " + JSON.stringify(data));
  }
});
}
</script>

</body>
</html>
